<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生出缺勤查詢系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .control-group label {
            font-weight: 600;
            color: #333;
        }
        
        .control-group input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .control-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .status-info {
            background: #f0f2f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            text-align: center;
        }
        
        .stat-card.present {
            border-left-color: #10b981;
        }
        
        .stat-card.absent {
            border-left-color: #ef4444;
        }
        
        .stat-card.total {
            border-left-color: #3b82f6;
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .stat-card.present .number {
            color: #10b981;
        }
        
        .stat-card.absent .number {
            color: #ef4444;
        }
        
        .stat-card.total .number {
            color: #3b82f6;
        }
        
        .stat-card .label {
            color: #666;
            font-size: 0.95em;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        thead {
            background: #f0f2f5;
            font-weight: 600;
        }
        
        th {
            padding: 15px;
            text-align: left;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            text-align: center;
            min-width: 60px;
        }
        
        .status-badge.check-in {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-badge.check-out {
            background: #dbeafe;
            color: #0c2d6b;
        }
        
        .status-badge.absent {
            background: #fee2e2;
            color: #7f1d1d;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
        }
        
        .error {
            background: #fee2e2;
            color: #7f1d1d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ef4444;
        }
        
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #10b981;
        }
        
        .footer {
            background: #f0f2f5;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #ddd;
        }
        
        /* 標籤頁樣式 */
        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 30px;
            gap: 0;
        }
        
        .tab-button {
            padding: 15px 25px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            margin: 0;
            border-radius: 0;
        }
        
        .tab-button:hover {
            background: #f0f2f5;
            color: #333;
        }
        
        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* 月份統計表格樣式 */
        .monthly-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .student-stat-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .student-stat-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }
        
        .student-stat-card .name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .student-stat-card .card-uid {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 600;
            color: #333;
        }
        
        .stat-value.present {
            color: #10b981;
        }
        
        .stat-value.absent {
            color: #ef4444;
        }
        
        .attendance-dates {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e5e7eb;
        }
        
        .attendance-dates .label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: block;
            font-size: 0.9em;
        }
        
        .date-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .date-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #f0f2f5;
            border-radius: 4px;
            font-size: 0.85em;
            color: #666;
        }
        
        .date-badge.present {
            background: #d1fae5;
            color: #065f46;
        }
        
        .date-badge.absent {
            background: #fee2e2;
            color: #7f1d1d;
        }
        
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            table {
                font-size: 0.9em;
            }
            
            th, td {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 學生出缺勤查詢系統</h1>
            <p id="status-text">正在連接 API...</p>
            <p id="server-info" style="font-size: 0.9em; opacity: 0.8; margin-top: 8px;"></p>
        </div>
        
        <div class="content">
            <!-- 訊息提示 -->
            <div id="message"></div>
            
            <!-- 標籤頁 -->
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('daily')">📅 每日查詢</button>
                <button class="tab-button" onclick="switchTab('monthly')">📊 當月統計</button>
            </div>
            
            <!-- 每日查詢標籤頁 -->
            <div id="daily" class="tab-content active">
                <!-- 控制面板 -->
                <div class="controls">
                    <div class="control-group">
                        <label for="dateInput">選擇日期：</label>
                        <input type="date" id="dateInput">
                    </div>
                    <button onclick="queryByDate()">查詢</button>
                    <button onclick="refreshData()" style="background: #10b981;">🔄 重新整理</button>
                </div>
                
                <!-- 統計資訊 -->
                <div class="status-info" id="statusInfo">
                    <div class="stat-card total">
                        <div class="label">總學人數</div>
                        <div class="number" id="totalStudents">0</div>
                    </div>
                    <div class="stat-card present">
                        <div class="label">已上課</div>
                        <div class="number" id="checkInCount">0</div>
                    </div>
                    <div class="stat-card absent">
                        <div class="label">未上課</div>
                        <div class="number" id="absentCount">0</div>
                    </div>
                </div>
                
                <!-- 學生列表 -->
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>學生姓名</th>
                                <th>卡號</th>
                                <th>班級</th>
                                <th>上課時間</th>
                                <th>下課時間</th>
                                <th>狀態</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable">
                            <tr>
                                <td colspan="6" class="loading">載入中</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 當月統計標籤頁 -->
            <div id="monthly" class="tab-content">
                <div class="controls" style="margin-bottom: 20px;">
                    <div class="control-group">
                        <label for="monthInput">選擇月份：</label>
                        <input type="month" id="monthInput">
                    </div>
                    <button onclick="loadMonthlyStats()">查詢月統計</button>
                    <button onclick="refreshData()" style="background: #10b981;">🔄 重新整理</button>
                </div>
                
                <div id="monthlyStatsContainer" class="monthly-stats-grid">
                    <div style="grid-column: 1 / -1; text-align: center; color: #999; padding: 40px;">
                        請選擇月份進行查詢
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>✓ 實時連接本地 API 伺服器</p>
        </div>
    </div>
    
    <!-- 應用配置 -->
    <script src="config.js"></script>
    
    <!-- 應用邏輯 -->
    <script src="app.js"></script>
</body>
</html>
