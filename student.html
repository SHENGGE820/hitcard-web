<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生打卡系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }

        /* ===== 登入頁面 ===== */
        #login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .login-logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .login-logo p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #334155;
            transition: background 0.3s;
        }

        .step-dot.active {
            background: #6366f1;
            width: 24px;
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #6366f1;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary:hover { background: #4f46e5; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #334155; cursor: not-allowed; }

        .error-msg {
            background: #450a0a;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .student-confirm {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .student-confirm .name { font-size: 18px; font-weight: 700; }
        .student-confirm .info { font-size: 13px; color: #64748b; margin-top: 4px; }

        .hint { font-size: 12px; color: #475569; margin-top: 8px; text-align: center; }

        /* ===== 主頁面 ===== */
        #main-page { display: none; }

        .top-bar {
            background: #1e293b;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar .user-info h2 { font-size: 16px; font-weight: 700; }
        .top-bar .user-info p { font-size: 12px; color: #64748b; margin-top: 2px; }

        .btn-logout {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

        .tab-bar {
            display: flex;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            min-width: 80px;
            padding: 14px 8px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }

        .tab-content { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* ===== 今日打卡 ===== */
        .today-header {
            text-align: center;
            padding: 24px 0 20px;
        }

        .today-header .date { font-size: 13px; color: #64748b; }
        .today-header .greeting { font-size: 24px; font-weight: 700; margin-top: 4px; }

        .attendance-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .att-card {
            background: #1e293b;
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            border: 1px solid #334155;
        }

        .att-card .label { font-size: 12px; color: #64748b; margin-bottom: 8px; }
        .att-card .time { font-size: 22px; font-weight: 700; color: #6366f1; }
        .att-card .time.absent { color: #ef4444; font-size: 16px; }
        .att-card .status-icon { font-size: 28px; margin-bottom: 4px; }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* ===== 月統計 ===== */
        .month-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .month-selector input {
            flex: 1;
            padding: 10px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
        }

        .month-selector button {
            padding: 10px 18px;
            background: #6366f1;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-box .num { font-size: 26px; font-weight: 700; }
        .stat-box .lbl { font-size: 11px; color: #64748b; margin-top: 4px; }
        .stat-box.present .num { color: #10b981; }
        .stat-box.absent .num { color: #ef4444; }
        .stat-box.total .num { color: #6366f1; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-header {
            text-align: center;
            font-size: 11px;
            color: #475569;
            padding: 6px 0;
            font-weight: 600;
        }

        .cal-day {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
        }

        .cal-day.present { background: #064e3b; color: #6ee7b7; }
        .cal-day.absent { background: #450a0a; color: #fca5a5; }
        .cal-day.leave { background: #1e3a5f; color: #93c5fd; }
        .cal-day.weekend { color: #334155; }
        .cal-day.not-school { color: #1e293b; }
        .cal-day.future { color: #334155; font-style: italic; }
        .cal-day.empty { background: transparent; }

        /* ===== 請假 ===== */
        .leave-form {
            background: #1e293b;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .leave-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

        .leave-form input,
        .leave-form textarea {
            width: 100%;
            padding: 11px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
            resize: vertical;
        }

        .leave-form textarea { min-height: 80px; }
        .leave-form input:focus, .leave-form textarea:focus { border-color: #6366f1; }

        .leave-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leave-item .date { font-weight: 600; }
        .leave-item .reason { font-size: 13px; color: #94a3b8; margin-top: 2px; }
        .badge {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge.approved { background: #064e3b; color: #6ee7b7; }

        /* ===== 作業 ===== */
        .hw-form {
            background: #1e293b;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .hw-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

        .hw-form input {
            width: 100%;
            padding: 11px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .hw-form input:focus { border-color: #6366f1; }
        .hw-form .hint-text { font-size: 12px; color: #475569; margin-bottom: 12px; }

        .hw-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #334155;
        }

        .hw-item .title { font-weight: 600; font-size: 14px; }
        .hw-item .meta { font-size: 12px; color: #64748b; margin-top: 4px; }
        .hw-item a {
            display: inline-block;
            margin-top: 8px;
            color: #6366f1;
            font-size: 13px;
            text-decoration: none;
        }

        .hw-item a:hover { text-decoration: underline; }

        /* ===== Loading ===== */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-center {
            text-align: center;
            padding: 40px;
            color: #475569;
        }

        .success-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #064e3b;
            color: #6ee7b7;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #475569;
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    </style>
</head>
<body>

<!-- ===== 登入頁面 ===== -->
<div id="login-page">
    <div class="login-card">
        <div class="login-logo">
            <span class="icon">🎓</span>
            <h1>學生打卡系統</h1>
            <p>學生登入入口</p>
        </div>

        <div class="step-indicator">
            <div class="step-dot active" id="dot-1"></div>
            <div class="step-dot" id="dot-2"></div>
            <div class="step-dot" id="dot-3"></div>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <!-- Step 1: 輸入名字 -->
        <div id="step-1">
            <div class="form-group">
                <label>你的姓名</label>
                <input type="text" id="input-name" placeholder="輸入姓名" autocomplete="off">
            </div>
            <button class="btn-primary" onclick="stepFindStudent()">下一步</button>
        </div>

        <!-- Step 2: 確認身份（同名時輸入學號） -->
        <div id="step-2" style="display:none">
            <div id="student-confirm-box"></div>
            <div id="step2-studentid-wrap" style="display:none">
                <div class="form-group">
                    <label>找到多位同名學生，請輸入學號確認</label>
                    <input type="text" id="input-student-id" placeholder="學號">
                </div>
            </div>
            <button class="btn-primary" id="btn-confirm" onclick="stepConfirmStudent()">確認是我</button>
            <p class="hint" style="margin-top:12px; cursor:pointer; color:#6366f1" onclick="goBack()">← 重新輸入</p>
        </div>

        <!-- Step 3: 設定 / 輸入密碼 -->
        <div id="step-3" style="display:none">
            <div id="step3-title" class="form-group" style="margin-bottom:24px">
                <p id="step3-label" style="font-size:15px; color:#94a3b8; text-align:center"></p>
            </div>
            <div class="form-group">
                <label id="pw-label">密碼</label>
                <input type="password" id="input-pw" placeholder="輸入密碼">
            </div>
            <div class="form-group" id="pw-confirm-wrap" style="display:none">
                <label>確認密碼</label>
                <input type="password" id="input-pw-confirm" placeholder="再輸入一次">
            </div>
            <button class="btn-primary" onclick="stepLogin()">登入</button>
            <p class="hint" style="margin-top:12px; cursor:pointer; color:#6366f1" onclick="goBack()">← 上一步</p>
        </div>
    </div>
</div>

<!-- ===== 主頁面 ===== -->
<div id="main-page">
    <div class="top-bar">
        <div class="user-info">
            <h2 id="top-name">--</h2>
            <p id="top-class">--</p>
        </div>
        <button class="btn-logout" onclick="logout()">登出</button>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('tab-today', this)">📅 今日打卡</button>
        <button class="tab-btn" onclick="switchTab('tab-monthly', this)">📊 月統計</button>
        <button class="tab-btn" onclick="switchTab('tab-leave', this)">🗓 請假</button>
        <button class="tab-btn" onclick="switchTab('tab-hw', this)">📝 作業</button>
    </div>

    <!-- 今日打卡 -->
    <div id="tab-today" class="tab-content active">
        <div class="today-header">
            <div class="date" id="today-date">--</div>
            <div class="greeting" id="today-greeting">你好！</div>
        </div>
        <div class="attendance-cards">
            <div class="att-card">
                <div class="status-icon" id="checkin-icon">⏰</div>
                <div class="label">上課打卡</div>
                <div class="time" id="checkin-time">未打卡</div>
            </div>
            <div class="att-card">
                <div class="status-icon" id="checkout-icon">🏁</div>
                <div class="label">下課打卡</div>
                <div class="time" id="checkout-time">未打卡</div>
            </div>
        </div>
        <div class="section-title">本週出席狀況</div>
        <div id="week-list">
            <div class="loading-center"><span class="spinner"></span>載入中...</div>
        </div>
    </div>

    <!-- 月統計 -->
    <div id="tab-monthly" class="tab-content">
        <div class="month-selector">
            <input type="month" id="month-input">
            <button onclick="loadMonthly()">查詢</button>
        </div>
        <div class="stat-row">
            <div class="stat-box present">
                <div class="num" id="stat-present">--</div>
                <div class="lbl">出席天數</div>
            </div>
            <div class="stat-box absent">
                <div class="num" id="stat-absent">--</div>
                <div class="lbl">缺席天數</div>
            </div>
            <div class="stat-box total">
                <div class="num" id="stat-total">--</div>
                <div class="lbl">應上課天數</div>
            </div>
        </div>
        <div class="section-title">出席日曆</div>
        <div id="monthly-calendar">
            <div class="loading-center"><span class="spinner"></span>載入中...</div>
        </div>
    </div>

    <!-- 請假 -->
    <div id="tab-leave" class="tab-content">
        <div class="leave-form">
            <h3>申請請假</h3>
            <input type="date" id="leave-date" placeholder="請假日期">
            <textarea id="leave-reason" placeholder="請假原因（選填）"></textarea>
            <button class="btn-primary" onclick="submitLeave()">送出請假申請</button>
        </div>
        <div class="section-title">請假記錄</div>
        <div id="leave-list">
            <div class="loading-center"><span class="spinner"></span>載入中...</div>
        </div>
    </div>

    <!-- 作業 -->
    <div id="tab-hw" class="tab-content">
        <div class="hw-form">
            <h3>繳交作業</h3>
            <input type="text" id="hw-title" placeholder="作業名稱（例：第三課習題）">
            <input type="url" id="hw-link" placeholder="Google Drive 連結">
            <p class="hint-text">💡 請先將檔案上傳至 Google Drive，設定為「知道連結的人皆可檢視」，再把連結貼上</p>
            <button class="btn-primary" onclick="submitHomework()">繳交作業</button>
        </div>
        <div class="section-title">繳交記錄</div>
        <div id="hw-list">
            <div class="loading-center"><span class="spinner"></span>載入中...</div>
        </div>
    </div>
</div>

<!-- Toast 通知 -->
<div class="success-toast" id="toast"></div>

<script src="config.js"></script>
<script src="student.js"></script>
</body>
</html>
